{% load i18n %}
<div class="flex gap-1.5">
    <a class="inline-flex items-center gap-1 px-2.5 py-1 text-xs text-cellar-muted no-underline rounded transition-colors hover:bg-cellar-wine-tint hover:text-cellar-text"
       href="{{ edit_url }}"
       title="{% translate "Edit" %}">
        <i class="fa-regular fa-pen-to-square"></i> <span>{% translate "Edit" %}</span>
    </a>
    <a class="inline-flex items-center gap-1 px-2.5 py-1 text-xs text-cellar-muted no-underline rounded transition-colors hover:bg-cellar-danger-tint hover:text-cellar-danger"
       href="{{ delete_url }}"
       title="{% translate "Delete" %}">
        <i class="fa-regular fa-trash-can"></i> <span>{% translate "Delete" %}</span>
    </a>
</div>
