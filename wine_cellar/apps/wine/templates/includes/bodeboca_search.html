{% load i18n %}
<div class="bodeboca-search form-container" data-search-url="{% url 'bodeboca-search' %}">
    <details>
        <summary class="bodeboca-search__summary">
            <span>{% translate "Find bottle photo on Bodeboca" %}</span>
        </summary>
        <div class="bodeboca-search__body">
            <div class="bodeboca-search__inputs pure-form">
                <input type="text"
                       id="bodeboca-query"
                       class="pure-input-2-3"
                       placeholder="{% translate "Wine name..." %}"
                       value="{{ form.name.value|default:'' }}">
                <button type="button"
                        id="bodeboca-btn"
                        class="pure-button button__primary pure-input-1-3">{% translate "Search" %}</button>
            </div>
            <div id="bodeboca-results" class="bodeboca-search__results"></div>
            {{ form.bodeboca_image_url }}
        </div>
    </details>
</div>

<style>
.bodeboca-search { margin-bottom: 1rem; }
.bodeboca-search__summary { cursor: pointer; color: var(--color-primary, #4a90d9); font-weight: 500; list-style: none; }
.bodeboca-search__summary::-webkit-details-marker { display: none; }
.bodeboca-search__summary::before { content: "▶ "; font-size: 0.7em; }
details[open] .bodeboca-search__summary::before { content: "▼ "; }
.bodeboca-search__body { margin-top: 0.75rem; }
.bodeboca-search__inputs { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; }
.bodeboca-search__inputs input { flex: 1; }
.bodeboca-search__results { display: flex; flex-wrap: wrap; gap: 0.5rem; }
.bodeboca-result { cursor: pointer; border: 2px solid transparent; border-radius: 4px; overflow: hidden; transition: border-color 0.15s; }
.bodeboca-result:hover { border-color: var(--color-primary, #4a90d9); }
.bodeboca-result.selected { border-color: #27ae60; }
.bodeboca-result img { width: 90px; height: 120px; object-fit: contain; background: #f5f5f5; display: block; }
.bodeboca-result__title { font-size: 0.65rem; padding: 2px 4px; max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bodeboca-search__msg { color: #888; font-size: 0.85rem; }
</style>

<script>
(function () {
    const container = document.querySelector('.bodeboca-search');
    if (!container) return;
    const searchUrl = container.dataset.searchUrl;
    const btn = document.getElementById('bodeboca-btn');
    const input = document.getElementById('bodeboca-query');
    const results = document.getElementById('bodeboca-results');
    const hiddenField = document.getElementById('id_bodeboca_image_url');

    btn.addEventListener('click', doSearch);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); doSearch(); } });

    function doSearch() {
        const q = input.value.trim();
        if (!q) return;
        results.innerHTML = '<span class="bodeboca-search__msg">{% translate "Searching..." %}</span>';
        fetch(`${searchUrl}?q=${encodeURIComponent(q)}`)
            .then(r => r.json())
            .then(data => renderResults(data.results || []))
            .catch(() => { results.innerHTML = '<span class="bodeboca-search__msg">{% translate "Search error. Try again." %}</span>'; });
    }

    function renderResults(hits) {
        if (!hits.length) {
            results.innerHTML = '<span class="bodeboca-search__msg">{% translate "No results found." %}</span>';
            return;
        }
        results.innerHTML = '';
        hits.forEach(hit => {
            const div = document.createElement('div');
            div.className = 'bodeboca-result';
            div.title = hit.title;
            div.innerHTML = `<img src="${hit.image_url}" alt="${hit.title}"><div class="bodeboca-result__title">${hit.title}</div>`;
            div.addEventListener('click', () => selectImage(hit, div));
            results.appendChild(div);
        });
    }

    function selectImage(hit, el) {
        document.querySelectorAll('.bodeboca-result').forEach(d => d.classList.remove('selected'));
        el.classList.add('selected');
        hiddenField.value = hit.image_url;
    }
})();
</script>
