{% load i18n %}
<div class="lg:w-1/4 shrink-0">
    <nav class="bg-white rounded-xl shadow-card py-3 overflow-hidden">
        <ul class="list-none p-0 m-0">
            <li>
                <a href="{% url 'user-settings' %}"
                   class="block px-5 py-2.5 text-sm no-underline transition-colors {% if request.resolver_match.url_name == 'user-settings' %}text-cellar-green font-medium bg-cellar-green-tint border-r-[3px] border-cellar-green{% else %}text-cellar-muted font-light hover:bg-cellar-green-tint hover:text-cellar-text{% endif %}">{% translate "General Settings" %}</a>
            </li>
            <li>
                <a href="{% url 'account_email' %}"
                   class="block px-5 py-2.5 text-sm no-underline transition-colors {% if request.resolver_match.url_name == 'account_email' %}text-cellar-green font-medium bg-cellar-green-tint border-r-[3px] border-cellar-green{% else %}text-cellar-muted font-light hover:bg-cellar-green-tint hover:text-cellar-text{% endif %}">{% translate "Email Addresses" %}</a>
            </li>
            <li>
                <a href="{% url 'account_change_password' %}"
                   class="block px-5 py-2.5 text-sm no-underline transition-colors {% if request.resolver_match.url_name == 'account_change_password' %}text-cellar-green font-medium bg-cellar-green-tint border-r-[3px] border-cellar-green{% else %}text-cellar-muted font-light hover:bg-cellar-green-tint hover:text-cellar-text{% endif %}">{% translate "Change Password" %}</a>
            </li>
            <li>
                <a href="{% url 'socialaccount_connections' %}"
                   class="block px-5 py-2.5 text-sm no-underline transition-colors {% if request.resolver_match.url_name == 'socialaccount_connections' %}text-cellar-green font-medium bg-cellar-green-tint border-r-[3px] border-cellar-green{% else %}text-cellar-muted font-light hover:bg-cellar-green-tint hover:text-cellar-text{% endif %}">{% translate "Social Accounts" %}</a>
            </li>
        </ul>
    </nav>
</div>
