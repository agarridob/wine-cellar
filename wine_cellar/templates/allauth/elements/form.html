{% load allauth %}
<form class="{% block class %}tw-form{% endblock class %}"
      method="{{ attrs.method }}"
      {% if attrs.action %}action="{{ attrs.action }}"{% endif %}>
      <ul class="text-cellar-danger font-bold text-sm mt-1 pl-4" aria-live="assertive" aria-atomic="true">
          {% for error in attrs.form.non_field_errors %}<li>{{ error|escape }}</li>{% endfor %}
      </ul>
    {% slot body %}
{% endslot %}
{% slot actions %}
{% endslot %}
</form>
